  <div style="overflow-y:auto;flex:1">${C.rmas.map(r=>`<div class="tbl-row" style="grid-template-columns:${cols}"><div style="font-size:12px;font-weight:600;color:var(--accent);font-family:var(--mono)">${r.id}</div><div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.co}</div><div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.part}</div><div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.reason}</div><div>${r.vendorRMA?`<span style="font-size:11px;font-family:var(--mono);color:var(--green)">${r.vendorRMA}</span>`:'<span class="badge b-red b-sm">Required</span>'}</div><div style="display:flex;gap:3px"><span style="font-size:10px;background:${r.auth1?'rgba(16,185,129,.12)':'var(--b1)'};color:${r.auth1?'var(--green)':'var(--dim)'};padding:2px 5px;border-radius:3px">${r.auth1||'—'}</span><span style="font-size:10px;background:${r.auth2?'rgba(16,185,129,.12)':'var(--b1)'};color:${r.auth2?'var(--green)':'var(--dim)'};padding:2px 5px;border-radius:3px">${r.auth2||'—'}</span></div><div><span class="badge ${r.status==='Authorized'?'b-green':r.status==='Received'?'b-accent':'b-amber'} b-sm">${r.status}</span></div></div>`).join('')}</div>
  <div class="tbl-foot"><span>3 RMAs · Vendor RMA required before customer RMA prints · Credit memos auto-generated · No negative invoice lines</span><span>Powered by STRUCZ™</span></div>
</div>`;
}

  <div class="toolbar"><div class="searchbar" style="flex:1;max-width:340px">${S.search}<input placeholder="Search offers…"></div><button class="pill on">All</button><button class="pill">IC Source</button><button class="pill">Broker Forum</button><button class="pill">Unconfirmed</button><button class="btn btn-primary" style="margin-left:auto">${S.plus} Add Offer</button><button class="btn" style="color:var(--zl);border-color:rgba(123,47,190,.35)">📡 Broadcast™</button></div>
  <div style="display:flex;gap:12px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--b1);flex-shrink:0"><div class="metric" style="flex:1;padding:10px 14px"><div class="m-lbl">New Offers Today</div><div style="font-size:20px;font-weight:700;color:var(--accent)">4</div><div style="font-size:10px;color:var(--muted)">Via IC Source + Broker Forum</div></div><div class="metric" style="flex:1;padding:10px 14px"><div class="m-lbl">ZED Matched</div><div style="font-size:20px;font-weight:700;color:var(--zl)">3</div><div style="font-size:10px;color:var(--muted)">Auto-matched to open reqs</div></div><div class="metric" style="flex:1;padding:10px 14px"><div class="m-lbl">Broadcast Sent</div><div style="font-size:20px;font-weight:700;color:var(--green)">847</div><div style="font-size:10px;color:var(--muted)">Hot Wanted · This week</div></div><div class="metric" style="flex:1;padding:10px 14px"><div class="m-lbl">Replies Received</div><div style="font-size:20px;font-weight:700;color:var(--amber)">12</div><div style="font-size:10px;color:var(--muted)">ZED processed 9 of 12</div></div></div>
  <div class="tbl-hdr" style="grid-template-columns:${cols}"><span>Offer #</span><span>Vendor</span><span>Part Number</span><span>Qty</span><span>Price</span><span>Cond</span><span>Source</span><span>Matches Req</span><span>Received</span><span>Status</span></div>
  <div style="overflow-y:auto;flex:1">${C.offers.map(o=>`<div class="tbl-row" style="grid-template-columns:${cols}"><div style="font-size:12px;font-weight:600;color:var(--accent);font-family:var(--mono)">${o.id}</div><div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${o.vendor}</div><div style="font-size:12px;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${o.part}</div><div style="font-size:12px">${o.qty.toLocaleString()}</div><div style="font-size:12px;font-weight:600;color:var(--green)">$${o.price.toFixed(2)}</div><div><span class="badge b-green b-sm">${o.cond}</span></div><div><span class="badge ${o.source==='IC Source'?'b-purple':o.source==='Broker Forum'?'b-accent':'b-muted'} b-sm">${o.source}</span></div><div><span style="font-size:11px;color:var(--zl);font-family:var(--mono)">${o.match}</span></div><div style="font-size:11px;color:var(--dim)">${o.date}</div><div><span class="badge ${o.confirmed?'b-green':'b-amber'} b-sm">${o.confirmed?'Confirmed':'Unconfirmed'}</span></div></div>`).join('')}</div>
  <div class="tbl-foot"><span>4 offers · Inbound vendor material · ZED auto-matches against open requirements</span><span>Powered by STRUCZ™</span></div>
</div>`;
}

  const sections=[['Company Setup','Logo, colors, document templates, time zone, currency, business description'],['Users & Permissions','Add users, assign roles, set permissions, manage departments, regions, sites'],['Authorization Rules','Configure quote, SO, PO, invoice authorization thresholds by dollar amount'],['Compensation Plans','Commission rates, tiers, quotas, bogey amounts per employee'],['ZED Configuration','Temperature sliders, persona, revival settings, outreach preferences'],['Lookup Lists','Edit all dropdowns — conditions, deal types, ship via, terms, RMA reasons, and more'],['Document Templates','Quote, invoice, SO confirmation, CofC, pick ticket — logo and branding per template'],['Accounting Integration','QuickBooks / Xero — Push Only, Bidirectional, or STRUCZ Primary mode'],['STRUCZ Connect™','400+ integrations — Slack, Salesforce, HubSpot, FedEx, Google Drive, and more'],['Label Printing','Zebra, Dymo label printer setup — item labels, receiving labels, pick tickets'],['Data Migration','CSV import, QuickBooks import, full database migration — self-service'],['AI Token Usage','Current period consumption, top-up packs, team usage breakdown']];
  return `<div style="padding:22px 24px"><h2 style="font-size:18px;font-weight:700;margin-bottom:6px">Settings</h2><div style="font-size:12px;color:var(--muted);margin-bottom:20px">Configure your STRUCZ workspace · ZD Integrated Circuits, Inc.</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">${sections.map(([t,d])=>`<div class="card" style="cursor:pointer;transition:border-color .15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--b1)'"><div style="font-size:13px;font-weight:600;margin-bottom:5px">${t}</div><div style="font-size:12px;color:var(--muted);line-height:1.5">${d}</div></div>`).join('')}</div><div class="powered" style="margin-top:24px">STRUCZ™ v1.0 · ZD Integrated Circuits, Inc. · admin.strucz.io for platform administration</div></div>`;
}

function renderZed(){
  const acts=[['Matched R-8841 against 3 IC Source offers','3:42 AM'],['7 revival emails sent — 2 opened','4:15 AM'],['CRS updated — Meridian Systems up to 95','5:01 AM'],['Pacific Rim replied — offer auto-created','6:33 AM'],['Morning briefing generated · 4 users','7:00 AM']];
  return `<div class="zed-panel"><div class="zed-hdr"><div class="zed-mark"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--zl)" stroke-width="2.2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div><div style="flex:1"><div style="font-weight:700;font-size:14px;color:var(--zl)">ZED™</div><div style="font-size:10px;color:rgba(168,85,247,.65)">AI Operator · Colleague Mode</div></div><button onclick="toggleZed()" style="background:transparent;border:none;padding:4px;color:var(--muted)">${S.close}</button></div>
  <div class="zed-sec"><div class="zed-lbl">ZED Needs You — 3 items</div>${C.zedNeeds.map(n=>`<div class="zed-need ${n.p}"><div style="font-size:12px;line-height:1.55;margin-bottom:7px">${n.text}</div><div style="display:flex;align-items:center;justify-content:space-between"><span style="font-size:10px;color:var(--dim)">${n.time}</span><div style="display:flex;gap:5px"><button class="btn btn-sm" style="font-size:11px;color:var(--zl);border-color:rgba(123,47,190,.35);padding:3px 9px">Yes →</button><button class="btn btn-sm" style="font-size:11px;padding:3px 8px">Review</button></div></div></div>`).join('')}</div>
  <div class="zed-sec scroll"><div class="zed-lbl">Morning Briefing</div><div style="background:rgba(123,47,190,.1);border:1px solid rgba(123,47,190,.18);border-radius:8px;padding:12px;margin-bottom:13px"><p style="font-size:12px;line-height:1.65;margin-bottom:8px">Good morning, Craig. Overnight I matched <strong style="color:var(--zl)">3 requirements</strong> against new offers and sent <strong style="color:var(--zl)">7 revival emails</strong> — two vendors replied.</p><p style="font-size:12px;line-height:1.65">You have <strong style="color:var(--red)">4 past-due sales orders</strong>. Acme Electronics is your top revival target — CRS 82, 90 days dormant, $142K lifetime GP.</p></div>
  <div class="zed-lbl">Ask ZED</div><div style="display:flex;gap:8px;background:rgba(123,47,190,.1);border:1px solid rgba(123,47,190,.22);border-radius:8px;padding:7px 10px;margin-bottom:13px"><input class="inp" placeholder="Ask ZED anything…" style="background:transparent;border:none;padding:0;font-size:12px"><button class="btn btn-primary btn-sm" style="flex-shrink:0">${S.send}</button></div>
  <div class="zed-lbl">ZED Overnight</div>${acts.map(([t,time],i)=>`<div style="display:flex;gap:8px;padding:6px 0;${i<acts.length-1?'border-bottom:1px solid var(--b1)':''}"><div style="width:5px;height:5px;border-radius:50%;background:var(--zl);flex-shrink:0;margin-top:5px"></div><div><div style="font-size:11px;line-height:1.5">${t}</div><div style="font-size:10px;color:var(--dim)">${time}</div></div></div>`).join('')}</div>
  <div class="zed-disc">ZED is AI and can make mistakes. Please double-check responses. · Powered by STRUCZ™</div></div>`;
}

function goPage(p){page=p;company=null;activeTab=0;render()}
function toggleZed(){zedOpen=!zedOpen;render()}
render();
</script>
