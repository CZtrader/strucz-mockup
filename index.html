<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STRUCZ™ — ZD Integrated Circuits</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   STRUCZ™ Design System v1.0
   ZD Integrated Circuits — Craig Lee Zurman
   ══════════════════════════════════════════════ */
:root {
  --blue:#1B3A6B; --accent:#2E86AB; --light:#D5E8F0;
  --bg:#0f1117; --surface:#161b27; --card:#1e2535;
  --hover:#232d40; --b1:#2a3347; --b2:#374160;
  --text:#e2e8f0; --muted:#8892a4; --dim:#4a5568;
  --green:#10b981; --gbg:#0a2418;
  --red:#ef4444;   --rbg:#2d1515;
  --amber:#f59e0b; --abg:#2d2010;
  --zed:#7B2FBE;   --zl:#a855f7; --zbg:#1a1030;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono','Fira Code',monospace;
  --nav:224px; --hdr:54px; --zw:348px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:var(--sans);cursor:pointer}
input,textarea{font-family:var(--sans)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}

/* ── Shell ── */
.shell{display:flex;height:100vh;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.content-area{flex:1;display:flex;overflow:hidden}
.page-body{flex:1;overflow-y:auto;overflow-x:hidden;min-width:0}

/* ── Sidebar ── */
.sidebar{width:var(--nav);background:var(--surface);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;height:100%}
.sidebar-logo{padding:15px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:11px}
.logo-sx{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;letter-spacing:-.5px;flex-shrink:0;box-shadow:0 2px 8px rgba(27,58,107,.4)}
.logo-name{font-weight:700;font-size:15px;color:var(--text);letter-spacing:-.3px;line-height:1.15}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:.03em}
.nav-section{padding:10px 16px 5px;font-size:10px;color:var(--dim);letter-spacing:.09em;font-weight:600;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:8px 16px;background:transparent;border:none;border-left:2px solid transparent;color:var(--muted);font-size:13px;font-weight:400;transition:all .12s;text-align:left;border-radius:0 5px 5px 0;line-height:1}
.nav-item:hover{background:var(--hover);color:var(--text)}
.nav-item.active{background:rgba(46,134,171,.13);border-left-color:var(--accent);color:var(--accent);font-weight:500}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.nav-divider{height:1px;background:var(--b1);margin:6px 0}
.sidebar-footer{padding:13px 16px;border-top:1px solid var(--b1);display:flex;align-items:center;gap:10px}

/* ── Header ── */
.header{height:var(--hdr);background:var(--surface);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.header-title{font-size:15px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--b1);border-radius:8px;padding:6px 12px;width:260px;transition:border-color .15s}
.search-bar:focus-within{border-color:var(--accent)}
.search-bar input{border:none;background:transparent;color:var(--text);font-size:13px;outline:none;width:100%}
.search-bar input::placeholder{color:var(--dim)}
.zed-btn{display:flex;align-items:center;gap:8px;background:rgba(123,47,190,.18);border:1px solid rgba(123,47,190,.38);border-radius:8px;padding:7px 14px;color:var(--zl);font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap}
.zed-btn:hover{background:rgba(123,47,190,.28)}
.notif-badge{background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px;line-height:1.4}
.icon-btn{background:transparent;border:none;color:var(--muted);display:flex;align-items:center;padding:6px;border-radius:6px;position:relative;transition:color .12s}
.icon-btn:hover{color:var(--text)}
.bell-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid var(--surface)}
.presence-stack{display:flex;align-items:center;gap:4px}
.online-label{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px;margin-left:3px;white-space:nowrap}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}

/* ── Avatars ── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;font-size:11px;line-height:1}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;line-height:1.6;white-space:nowrap}
.b-accent{background:rgba(46,134,171,.18);color:var(--accent)}
.b-green{background:rgba(16,185,129,.15);color:var(--green)}
.b-red{background:rgba(239,68,68,.18);color:var(--red)}
.b-amber{background:rgba(245,158,11,.18);color:var(--amber)}
.b-purple{background:rgba(123,47,190,.2);color:var(--zl)}
.b-muted{background:rgba(136,146,164,.12);color:var(--muted)}
.b-sm{font-size:9px;padding:1px 5px;border-radius:3px}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--b1);border-radius:10px;padding:15px 16px}
.card-lbl{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:11px}

/* ── Metric card ── */
.metric{background:var(--card);border:1px solid var(--b1);border-radius:10px;padding:15px 16px}
.m-lbl{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.m-val{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.m-delta{font-size:11px;margin-top:5px}
.up{color:var(--green)} .dn{color:var(--red)}

/* ── Layout grids ── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ── Progress ── */
.prog-track{height:8px;background:var(--b1);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--green))}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:10px;padding:11px 20px;border-bottom:1px solid var(--b1);background:var(--surface);flex-shrink:0;flex-wrap:wrap}

/* ── Filter pills ── */
.pill{padding:5px 12px;border-radius:7px;border:1px solid var(--b1);background:transparent;color:var(--muted);font-size:12px;font-weight:500;transition:all .12s}
.pill:hover{border-color:var(--b2);color:var(--text)}
.pill.on{border-color:var(--accent);background:rgba(46,134,171,.13);color:var(--accent)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;border:1px solid var(--b1);background:transparent;color:var(--text);transition:all .12s}
.btn:hover{background:var(--hover);border-color:var(--b2)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.btn-primary:hover{background:#2474a0;border-color:#2474a0}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-ghost{border:none;background:transparent;color:var(--muted)}
.btn-ghost:hover{color:var(--text);background:transparent}

/* ── Table ── */
.tbl-hdr{display:grid;padding:8px 20px;border-bottom:1px solid var(--b1);background:var(--surface);flex-shrink:0}
.tbl-hdr span{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.tbl-row{display:grid;padding:11px 20px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s;align-items:center}
.tbl-row:hover{background:var(--hover)}

/* ── Info rows ── */
.info-r{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--b1);font-size:12px}
.info-r:last-child{border-bottom:none}
.il{color:var(--muted)} .iv{color:var(--text)}

/* ── Tabs ── */
.tab-bar{display:flex;border-bottom:1px solid var(--b1);padding:0 20px}
.tab{padding:9px 14px;border:none;background:transparent;border-bottom:2px solid transparent;color:var(--muted);font-size:13px;font-weight:400;transition:all .12s}
.tab:hover{color:var(--text)}
.tab.on{border-bottom-color:var(--accent);color:var(--accent);font-weight:600}

/* ── Company record ── */
.co-wrap{display:flex;height:100%;overflow:hidden}
.co-main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.co-tl{width:308px;border-left:1px solid var(--b1);background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}

/* ── Timeline ── */
.tl-wrap{flex:1;overflow-y:auto;padding:13px 14px}
.tl-entry{display:flex;gap:11px;padding-bottom:15px;position:relative;padding-left:16px;margin-left:7px}
.tl-entry::before{content:'';position:absolute;left:-1px;top:16px;width:1px;bottom:0;background:var(--b1)}
.tl-entry:last-child::before{display:none}
.tl-dot{position:absolute;left:-7px;top:3px;width:14px;height:14px;border-radius:50%;background:var(--card);border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center}
.tl-pip{width:5px;height:5px;border-radius:50%;background:currentColor}

/* ── ZED Panel ── */
.zed-panel{width:var(--zw);background:var(--zbg);border-left:1px solid rgba(123,47,190,.28);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.zed-hdr{padding:14px 15px;border-bottom:1px solid rgba(123,47,190,.2);display:flex;align-items:center;gap:11px;flex-shrink:0}
.zed-mark{width:33px;height:33px;border-radius:8px;background:rgba(123,47,190,.28);border:1px solid rgba(123,47,190,.45);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.zed-sec{padding:12px 14px;border-bottom:1px solid rgba(123,47,190,.12);flex-shrink:0}
.zed-sec.scroll{flex:1;overflow-y:auto;border-bottom:none}
.zed-lbl{font-size:10px;color:var(--zl);font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:9px}
.zed-need{background:rgba(123,47,190,.09);border:1px solid rgba(123,47,190,.18);border-radius:8px;padding:10px 11px;margin-bottom:8px}
.zed-need:last-child{margin-bottom:0}
.zed-need.high{border-left:3px solid var(--red)}
.zed-need.med{border-left:3px solid var(--amber)}
.zed-need.low{border-left:3px solid var(--dim)}
.zed-disc{font-size:10px;color:var(--dim);padding:9px 14px;border-top:1px solid var(--b1);line-height:1.5;flex-shrink:0}

/* ── Input ── */
.inp{background:var(--card);border:1px solid var(--b1);border-radius:7px;padding:7px 12px;color:var(--text);font-size:13px;outline:none;width:100%;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--dim)}
textarea.inp{resize:none;line-height:1.5}

/* ── Note form ── */
.note-form{display:none;padding:11px 14px;border-bottom:1px solid var(--b1);background:var(--card);flex-shrink:0}
.note-form.show{display:block}

/* ── Placeholder screen ── */
.ph{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:40px}
.ph-icon{width:68px;height:68px;border-radius:18px;background:rgba(46,134,171,.1);border:1px solid rgba(46,134,171,.2);display:flex;align-items:center;justify-content:center}

/* ── Powered by ── */
.powered{font-size:10px;color:var(--dim);letter-spacing:.06em;text-align:center;margin-top:22px}

/* ── Intro banner ── */
.intro-banner{background:linear-gradient(135deg,rgba(27,58,107,.6),rgba(123,47,190,.3));border:1px solid rgba(46,134,171,.3);border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
</style>
</head>
<body>

<div class="shell">

    <button class="nav-item" id="nav-invoices" onclick="goPage('invoices')">

    <button class="nav-item" id="nav-settings" onclick="goPage('settings')">

  <div class="sidebar-footer">
    <div class="av" style="width:31px;height:31px;background:rgba(46,134,171,.22);border:1px solid rgba(46,134,171,.4);color:var(--accent);font-size:11px;font-weight:700;">CZ</div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Craig Zurman</div>

<!-- ════════════════ MAIN ════════════════ -->
<div class="main">

  <!-- Header -->
  <header class="header">
    <span class="header-title" id="hdr-title">Contact Manager</span>

    <div class="search-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--dim)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input placeholder="Search companies, parts, orders… ⌘K" id="global-search">
    </div>

    <button class="zed-btn" onclick="toggleZed()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      ZED <span class="notif-badge" id="zed-count">3</span>
    </button>

    <div class="presence-stack">
      <div class="av" style="width:28px;height:28px;background:rgba(46,134,171,.22);border:1px solid rgba(46,134,171,.4);color:var(--accent);" title="Craig Zurman — Online">CZ</div>
      <div class="av" style="width:28px;height:28px;background:rgba(74,85,104,.28);border:1px solid rgba(74,85,104,.4);color:var(--muted);" title="Lisa Petrov — Online">LP</div>
      <div class="av" style="width:28px;height:28px;background:rgba(74,85,104,.28);border:1px solid rgba(74,85,104,.4);color:var(--muted);" title="Mike Ruiz — Online">MR</div>
      <div class="av" style="width:28px;height:28px;background:rgba(74,85,104,.28);border:1px solid rgba(74,85,104,.4);color:var(--muted);" title="Jake Burns — Online">JB</div>
      <span class="online-label"><span class="online-dot"></span> 4 online</span>

      <button class="btn btn-sm" style="font-size:11px;color:var(--accent);border-color:rgba(46,134,171,.3);" onclick="document.getElementById('nf').classList.toggle('show')">+ Note</button>
    </div>

    <div class="note-form" id="nf">
      <textarea class="inp" rows="3" placeholder="Add a note… e.g. 'Spoke to Jane — call back next week re Q4 budget'"></textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <label style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer;">
          <input type="checkbox" style="accent-color:var(--accent);"> Set follow-up task
        </label>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm" onclick="document.getElementById('nf').classList.remove('show')">Cancel</button>
          <button class="btn btn-primary btn-sm">Save Note</button>
        </div>
      </div>
    </div>

    <div class="tl-wrap">
      ${timeline.length === 0
        ? `<div style="font-size:12px;color:var(--dim);text-align:center;padding:20px 0;">No activity yet</div>`
        : timeline.map(e=>`
      <div class="tl-entry" style="color:${tlColor(e)};">
        <div class="tl-dot"><div class="tl-pip"></div></div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px;flex-wrap:wrap;">
            ${e.zed?'<span class="badge b-purple b-sm">ZED</span>':''}
            <span style="font-size:10px;color:var(--dim);">${e.actor} · ${e.time}</span>
          </div>
          <div style="font-size:12px;color:var(--text);line-height:1.55;">${e.text}</div>
        </div>
      </div>`).join('')}
    </div>

    <div class="zed-disc">
      ZED is AI and can make mistakes. Please double-check responses. · Powered by STRUCZ™
    </div>
  </div>

</div>`;
}

<div class="zed-panel">

    <div class="zed-mark">

    <div style="flex:1;">

    <div class="zed-need ${n.p}">

      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:10px;color:var(--dim);">${n.time}</span>
        <div style="display:flex;gap:5px;">
          <button class="btn btn-sm" style="font-size:11px;color:var(--zl);border-color:rgba(123,47,190,.35);padding:3px 10px;">Yes →</button>
          <button class="btn btn-sm" style="font-size:11px;padding:3px 8px;">Review</button>
        </div>
      </div>
    </div>`).join('')}
  </div>

  <div class="zed-sec scroll">
    <div class="zed-lbl">Morning Briefing</div>
    <div style="background:rgba(123,47,190,.1);border:1px solid rgba(123,47,190,.18);border-radius:8px;padding:13px;margin-bottom:14px;">
      <p style="font-size:12px;color:var(--text);line-height:1.65;margin-bottom:9px;">
        Good morning, Craig. Overnight I matched <strong style="color:var(--zl);">3 requirements</strong> against new offers and sent <strong style="color:var(--zl);">7 revival emails</strong> — two vendors have already replied.
      </p>
      <p style="font-size:12px;color:var(--text);line-height:1.65;">
        You have <strong style="color:var(--red);">4 past-due sales orders</strong> that need attention today. Acme Electronics is your highest-priority revival target — CRS 82, 90 days dormant, $142K lifetime GP.
      </p>
    </div>

    <div class="zed-lbl">Ask ZED</div>
    <div style="display:flex;gap:8px;background:rgba(123,47,190,.1);border:1px solid rgba(123,47,190,.22);border-radius:8px;padding:8px 11px;margin-bottom:14px;">
      <input class="inp" placeholder="Ask ZED anything about your business…" style="background:transparent;border:none;padding:0;font-size:12px;height:auto;">
      <button class="btn btn-primary btn-sm" style="flex-shrink:0;font-size:12px;">${svg.send}</button>
    </div>

    <div class="zed-lbl">ZED Overnight</div>
    ${acts.map(([t,time],i)=>`
    <div style="display:flex;gap:9px;padding:7px 0;${i<acts.length-1?'border-bottom:1px solid var(--b1)':''}">
      <div style="width:5px;height:5px;border-radius:50%;background:var(--zl);flex-shrink:0;margin-top:5px;"></div>
      <div>
        <div style="font-size:11px;color:var(--text);line-height:1.55;">${t}</div>
        <div style="font-size:10px;color:var(--dim);">${time}</div>
      </div>
    </div>`).join('')}

  <div class="zed-disc">
    ZED is AI and can make mistakes. Please double-check responses. · Powered by STRUCZ™
  </div>
</div>`;
}
